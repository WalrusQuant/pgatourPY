on:
  push:
    branches: [main]
  workflow_dispatch:

name: docs

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install mkdocs-material mkdocstrings[python]

      - name: Build and deploy
        run: mkdocs gh-deploy --force
